// localStorage로 새로고침해도 진행상황 유지
const STORE_KEY = 'gwacheon_thankyou_sent';
const sentSet = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]'));

function saveSent() {
  localStorage.setItem(STORE_KEY, JSON.stringify([...sentSet]));
}

function updateProgress() {
  const done = sentSet.size;
  const pct = (done / TOTAL) * 100;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('pcnt').textContent = done + ' / ' + TOTAL + '명';
  if (done === TOTAL) {
    document.getElementById('allDone').classList.add('show');
  }
}

function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream}

function makeSmsLink(phone, msg){
  const enc = encodeURIComponent(msg);
  return isIOS() ? `sms:${phone}&body=${enc}` : `sms:${phone}?body=${enc}`;
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

async function copyMsg(text, btn){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  const orig=btn.textContent;
  btn.textContent='✓ 복사됨'; btn.classList.add('done');
  setTimeout(()=>{btn.textContent=orig; btn.classList.remove('done');},2200);
}

        <div style="flex:1">
          <div class="member-name">${m.name} ${m.role}</div>
          <div class="member-role">${phoneDisplay}</div>
        </div>
        <span class="sent-badge">보냄 ✓</span>
      </div>
      <div class="msg-wrap">
        <div class="msg-text">${msg}</div>
      </div>
      <span class="version-badge">버전 ${idx+1} / ${m.msgs.length}</span>
      <div class="card-actions">
        <a class="btn-sms" href="${link}">
          <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${sent ? '다시 보내기' : '문자 보내기'}
        </a>
        <button class="btn-copy">복사</button>
      </div>
    `;

    card.querySelector('.btn-sms').addEventListener('click', ()=>{
      if(isIOS()) navigator.clipboard.writeText(msg).catch(()=>{});
      sentSet.add(mi);
      saveSent();
      idx = (idx + 1) % m.msgs.length;
      setTimeout(()=>{
        render();
        updateProgress();
      }, 400);
    });

    card.querySelector('.btn-copy').addEventListener('click', function(){
      copyMsg(msg, this);
    });
  }

  render();
  container.appendChild(card);
});

updateProgress();
</script>
</body>
</html>
