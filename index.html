<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>과천 주암지구 데이터센터 반대</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
  background: #F4F6FB;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #E2E8F4;
  padding: 48px 36px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.icon { font-size: 48px; margin-bottom: 20px; }
.title {
  font-size: 20px;
  font-weight: 600;
  color: #1E293B;
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}
.desc {
  font-size: 14px;
  color: #64748B;
  line-height: 1.75;
  margin-bottom: 28px;
}
.badge {
  display: inline-block;
  background: #EEF2FA;
  color: #2C4A8C;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 99px;
  letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <div class="title">민원 내용을 업데이트하고 있습니다</div>
  <p class="desc">
    곧 돌아오겠습니다.<br><br>
    함께해 주셔서 감사합니다 🙏
  </p>
</div>
</body>
</html>
